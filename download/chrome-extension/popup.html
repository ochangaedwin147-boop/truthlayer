<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TruthLayer</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" fill="#10B981" stroke="#10B981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M9 12l2 2 4-4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>TruthLayer</span>
      </div>
      <button id="settingsBtn" class="icon-btn" title="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
    </header>

    <!-- Settings Panel (hidden by default) -->
    <div id="settingsPanel" class="panel hidden">
      <h3>Settings</h3>
      <div class="form-group">
        <label for="apiUrl">API URL</label>
        <input type="text" id="apiUrl" placeholder="https://your-truthlayer-instance.com">
      </div>
      <div class="form-group">
        <label for="apiKey">API Key</label>
        <input type="password" id="apiKey" placeholder="Your API key">
      </div>
      <div class="button-group">
        <button id="saveSettings" class="btn btn-primary">Save</button>
        <button id="closeSettings" class="btn btn-secondary">Cancel</button>
      </div>
    </div>

    <!-- Main Panel -->
    <div id="mainPanel" class="panel">
      <!-- Selection Mode -->
      <div class="mode-tabs">
        <button class="mode-tab active" data-mode="text">Text</button>
        <button class="mode-tab" data-mode="selection">Selection</button>
      </div>

      <!-- Text Input Mode -->
      <div id="textMode" class="mode-content">
        <textarea id="contentInput" placeholder="Paste content to verify..."></textarea>
      </div>

      <!-- Selection Mode -->
      <div id="selectionMode" class="mode-content hidden">
        <p class="selection-hint">Select text on any webpage, then click "Analyze Selection"</p>
        <button id="getSelection" class="btn btn-secondary btn-full">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
          Get Selection
        </button>
        <textarea id="selectedContent" placeholder="Selected text will appear here..." readonly></textarea>
      </div>

      <button id="verifyBtn" class="btn btn-primary btn-full">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          <path d="M9 12l2 2 4-4"/>
        </svg>
        <span id="verifyBtnText">Verify Content</span>
      </button>

      <!-- Results -->
      <div id="results" class="hidden">
        <div class="trust-score">
          <div class="score-circle">
            <svg viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="45" fill="none" stroke="#1e293b" stroke-width="8"/>
              <circle id="scoreArc" cx="50" cy="50" r="45" fill="none" stroke="#10B981" stroke-width="8" 
                stroke-dasharray="0 283" stroke-linecap="round" transform="rotate(-90 50 50)"/>
            </svg>
            <div class="score-value">
              <span id="scoreNumber">--</span>
              <span class="score-max">/100</span>
            </div>
          </div>
          <div id="trustLabel" class="trust-label">Analyzing...</div>
          <p id="trustDescription" class="trust-description"></p>
        </div>

        <div id="flags" class="flags hidden">
          <h4>Warning Flags</h4>
          <div id="flagsList"></div>
        </div>

        <div class="analysis">
          <h4>Analysis</h4>
          <p id="analysisText"></p>
        </div>

        <div class="hash">
          <span>Content Hash: </span>
          <code id="contentHash"></code>
        </div>
      </div>

      <!-- Error State -->
      <div id="error" class="hidden">
        <div class="error-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
        </div>
        <p id="errorText"></p>
        <button id="retryBtn" class="btn btn-secondary">Try Again</button>
      </div>

      <!-- Not Configured State -->
      <div id="notConfigured" class="hidden">
        <div class="setup-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </div>
        <h3>Setup Required</h3>
        <p>Configure your API URL and key to start verifying content.</p>
        <button id="openSettings" class="btn btn-primary">Configure</button>
      </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading" class="hidden">
      <div class="spinner"></div>
      <p>Analyzing content...</p>
    </div>
  </div>

  <footer>
    <a href="#" id="dashboardLink">Open Dashboard</a>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
